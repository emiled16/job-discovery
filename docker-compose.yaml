services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_TELEMETRY_DISABLED: "${NEXT_TELEMETRY_DISABLED:-1}"
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}"
      API_INTERNAL_BASE_URL: "${API_INTERNAL_BASE_URL:-http://api:8000}"
      PORT: "${FRONTEND_PORT:-3000}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - platform

  api:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BACKEND_HOST: "${BACKEND_HOST:-0.0.0.0}"
      BACKEND_PORT: "${BACKEND_PORT:-8000}"
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://job_discovery:job_discovery@postgres:5432/job_discovery}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; response = urlopen('http://127.0.0.1:8000/health'); raise SystemExit(0 if response.status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - platform

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "job_discovery_backend.worker.main"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      WORKER_DATABASE_URL: "${WORKER_DATABASE_URL:-postgresql+psycopg://job_discovery:job_discovery@postgres:5432/job_discovery}"
      WORKER_BROKER_URL: "${WORKER_BROKER_URL:-redis://redis:6379/0}"
      WORKER_RESULT_BACKEND: "${WORKER_RESULT_BACKEND:-redis://redis:6379/1}"
      WORKER_HTTP_TIMEOUT_SECONDS: "${WORKER_HTTP_TIMEOUT_SECONDS:-15}"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from job_discovery_backend.worker.celery_app import celery_app; connection = celery_app.connection_for_read(); connection.ensure_connection(max_retries=1); connection.release()",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - platform

  scheduler:
    build:
      context: ./backend
    command: ["python", "-m", "job_discovery_backend.scheduler.main"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://job_discovery:job_discovery@postgres:5432/job_discovery}"
      SCHEDULER_BROKER_URL: "${SCHEDULER_BROKER_URL:-redis://redis:6379/0}"
      SCHEDULER_RESULT_BACKEND: "${SCHEDULER_RESULT_BACKEND:-redis://redis:6379/1}"
      SCHEDULER_SYNC_INTERVAL_SECONDS: "${SCHEDULER_SYNC_INTERVAL_SECONDS:-14400}"
      SCHEDULER_TIMEZONE: "${SCHEDULER_TIMEZONE:-UTC}"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from job_discovery_backend.scheduler.celery_app import celery_app; assert 'global-sync' in celery_app.conf.beat_schedule; connection = celery_app.connection_for_read(); connection.ensure_connection(max_retries=1); connection.release()",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - platform

  postgres:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-job_discovery}"
      POSTGRES_USER: "${POSTGRES_USER:-job_discovery}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-job_discovery}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - platform

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    networks:
      - platform

networks:
  platform:
    driver: bridge

volumes:
  postgres-data:
